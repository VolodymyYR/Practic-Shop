<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/only-shop/css/styleReset.css">
    <link rel="stylesheet" href="/only-shop/css/main.css">
    <title>Document</title>
</head>
<body>
    <div class="wrapper">
        <header class="header" id="main-header"></header>

        <!-- =================== MAIN ============================ -->
        
        <main class="basket" id="basket-page">
            <div class="basket__container">
                <div class="basket__view view-basket">
                    <div class="view-basket__header">
                        <h2 class="view-basket__title">Basket</h2>
                    </div>
                    <div class="view-basket__content content-basket card-items">

                        <div class="content-basket__item item-content-basket">
                            <div class="item-content-basket__image">
                                <img src="/only-shop/img/kigurumi-slippers/Авокадо/slippers.webp" alt="product image">
                            </div>
                            <div class="item-content-basket__info">
                                <div class="item-content-basket__info-main">
                                    <div class="item-content-basket__title">iPhone 14 Pro Max</div>
                                    <div class="item-content-basket__price">
                                        <span class="item-content-basket__price-old">£1,099.00</span>
                                        <div class="item-content-basket__price-actual">
                                            <span class="item-content-basket__price-new">£999.00</span>
                                            <span class="item-content-basket__price-discount">10%</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="item-content-basket__info-details">
                                    <button class="item-content-basket__remove">🗑️</button>
                                    <div class="item-content-basket__quantity quantity" data-counter>
                                        <button class="quantity__btn quantity-btn-plus" data-counter-btn="plus">+</button>
                                        <div class="quantity__block-input">
                                            <input type="number" class="quantity__input" data-counter-input value="1" min="1" max="50">
                                        </div>
                                        <button class="quantity__btn quantity-btn-minus" data-counter-btn="minus">-</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="content-basket__item item-content-basket">
                            <div class="item-content-basket__image">
                                <img src="/only-shop/img/kigurumi-slippers/Авокадо/slippers.webp" alt="product image">
                            </div>
                            <div class="item-content-basket__info">
                                <div class="item-content-basket__info-main">
                                    <div class="item-content-basket__title">iPhone 14 Pro Max</div>
                                    <div class="item-content-basket__price">
                                        <span class="item-content-basket__price-old">£1,099.00</span>
                                        <div class="item-content-basket__price-actual">
                                            <span class="item-content-basket__price-new">£999.00</span>
                                            <span class="item-content-basket__price-discount">10%</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="item-content-basket__info-details">
                                    <button class="item-content-basket__remove">🗑️</button>
                                    <div class="item-content-basket__quantity quantity" data-counter>
                                        <button class="quantity__btn quantity-btn-plus" data-counter-btn="plus">+</button>
                                        <div class="quantity__block-input">
                                            <input type="number" class="quantity__input" data-counter-input value="1" min="1" max="50">
                                        </div>
                                        <button class="quantity__btn quantity-btn-minus" data-counter-btn="minus">-</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                    </div>
                    <div class="view-basket__footer">
                        <button class="view-basket__checkout product-card__console">Checkout</button>
                        <button class="view-basket__checkout clear-basket">Clear Basket</button>
                    </div>
                </div>
            </div>
        </main>

        
        <footer class="footer" id="main-footer"></footer>
    </div>
</body>
<script type="module" src="../js/main.js"></script>
</html>
